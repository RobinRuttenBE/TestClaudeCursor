<title>SYBB Dashboard — Sempertex Europe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--purple-dark:#1b073d;--purple-main:#6b3fb9;--purple-light:#f1d9ff;--purple-bg:#f8f4ff;--yellow:#ffdb5a;--yellow-light:#fff8e0;--warning:#cd0b5c;--green:#16a34a;--green-light:#dcfce7;--red:#dc2626;--red-light:#fee2e2;--bg:#faf9fc;--white:#fff;--border:#e8e0f0;--text:#1b073d;--text-muted:#6b6480;--text-light:#9b8fb5}
body{font-family:'Rethink Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--purple-dark);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar .logo{padding:0 20px 24px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:16px}
.sidebar .logo h2{font-size:15px;font-weight:800;color:var(--purple-light)}
.sidebar .logo span{font-size:11px;color:rgba(255,255,255,0.4)}
.sidebar nav{padding:0 12px}
.sidebar .ns{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.3);padding:16px 8px 8px;font-weight:600}
.sidebar a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,0.6);text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s;cursor:pointer}
.sidebar a:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9)}
.sidebar a.active{background:var(--purple-main);color:white;font-weight:700}
.main{padding:28px 32px;max-width:1200px;overflow-y:auto}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.ph h1{font-size:24px;font-weight:800;color:var(--purple-dark)}
.ph .sub{font-size:13px;color:var(--text-muted);margin-top:4px}
.db{background:var(--purple-light);color:var(--purple-main);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;border-left:4px solid}
.alert.critical{background:var(--red-light);border-color:var(--warning);color:#991b1b}
.alert.warning{background:var(--yellow-light);border-color:var(--yellow);color:#92400e}
.alert.info{background:#e0f2fe;border-color:#0284c7;color:#075985}
.alert.success{background:var(--green-light);border-color:var(--green);color:#166534}
.kg{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:28px}
.kc{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.kc .l{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);font-weight:600;margin-bottom:6px}
.kc .v{font-size:22px;font-weight:800;color:var(--purple-dark)}
.kc .trend{font-size:11px;margin-top:4px;font-weight:700}
.kc .trend.up{color:var(--green)}.kc .trend.down{color:var(--red)}.kc .trend.flat{color:var(--text-muted)}
.kc .s{font-size:11px;margin-top:2px;font-weight:600}
.kc .s.ok{color:var(--green)}.kc .s.bad{color:var(--red)}.kc .s.warn{color:#b45309}.kc .s.na{color:var(--text-light)}
.kc .src{font-size:9px;color:var(--text-light);margin-top:2px;font-style:italic}
.sec{margin-bottom:28px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.st{font-size:15px;font-weight:700;color:var(--purple-dark)}
.sb{background:var(--purple-light);color:var(--purple-main);font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
table{width:100%;border-collapse:collapse;background:var(--white);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
thead th{background:var(--purple-dark);color:var(--purple-light);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;padding:12px;text-align:center;font-weight:700}
thead th:first-child{text-align:left;padding-left:16px}
tbody td{padding:10px 12px;text-align:center;font-size:13px;font-weight:500;border-bottom:1px solid var(--border)}
tbody td:first-child{text-align:left;font-weight:700;color:var(--purple-dark);padding-left:16px}
tbody tr:nth-child(even){background:var(--purple-bg)}tbody tr:hover{background:var(--purple-light)}
tbody tr.clickable{cursor:pointer}tbody tr.clickable:hover{background:var(--yellow-light)}
.f{font-size:11px;text-align:left!important;font-weight:600}
.f.good{color:var(--green)}.f.bad{color:var(--red)}.f.warn{color:#b45309}.f.na{color:var(--text-light);font-style:italic}
.bc{background:var(--green-light);color:var(--green);font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700}
.be{background:var(--yellow-light);color:#92400e;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ac{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;border-top:3px solid var(--purple-main)}
.ac .n{font-size:28px;font-weight:800;color:var(--purple-light)}
.ac .t{font-size:14px;font-weight:700;color:var(--purple-dark);margin:4px 0 8px}
.ac .d{font-size:12px;color:var(--text-muted);line-height:1.6}
.ac .p{margin-top:12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.ac .p.high{color:var(--warning)}.ac .p.medium{color:#b45309}
.day-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.day-tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text-muted);transition:all 0.15s}
.day-tab:hover{border-color:var(--purple-main);color:var(--purple-main)}
.day-tab.active{background:var(--purple-main);color:white;border-color:var(--purple-main)}
.page{display:none}.page.active{display:block}
.ft{text-align:center;color:var(--text-light);font-size:11px;padding:20px 0;margin-top:20px;border-top:1px solid var(--border)}
.es{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:40px;text-align:center;color:var(--text-muted)}
.note{background:var(--yellow-light);border:1px solid var(--yellow);border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-top:8px;font-style:italic}
@media(max-width:1000px){.layout{grid-template-columns:1fr}.sidebar{display:none}.kg{grid-template-columns:repeat(3,1fr)}.ag{grid-template-columns:1fr}}
</style>
</head>
