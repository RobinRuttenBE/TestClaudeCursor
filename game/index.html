<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARENA BLITZ - 2D Multiplayer Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  cursor: crosshair;
}
canvas {
  display: block;
  margin: 0 auto;
}
#ui-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
#ui-overlay > * { pointer-events: auto; }
#shop-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#shop-overlay.active { display: flex; }
.shop-container {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #e94560;
  border-radius: 16px;
  padding: 30px;
  max-width: 900px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.shop-title {
  color: #e94560;
  font-size: 36px;
  text-align: center;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 4px;
}
.shop-subtitle {
  color: #aaa;
  text-align: center;
  margin-bottom: 25px;
  font-size: 14px;
}
.shop-section {
  margin-bottom: 20px;
}
.shop-section h3 {
  color: #0f3460;
  background: #e94560;
  padding: 8px 16px;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
}
.shop-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 15px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.shop-item:hover {
  background: rgba(233,69,96,0.15);
  border-color: #e94560;
  transform: translateY(-2px);
}
.shop-item.owned {
  border-color: #4ecca3;
  opacity: 0.6;
}
.shop-item.equipped {
  border-color: #ffd700;
  opacity: 1;
  box-shadow: 0 0 15px rgba(255,215,0,0.3);
}
.shop-item .item-name {
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 4px;
}
.shop-item .item-desc {
  color: #888;
  font-size: 12px;
  margin-bottom: 8px;
}
.shop-item .item-stats {
  color: #4ecca3;
  font-size: 11px;
  margin-bottom: 8px;
}
.shop-item .item-price {
  color: #ffd700;
  font-size: 14px;
  font-weight: bold;
}
.shop-item .item-badge {
  position: absolute;
  top: 8px; right: 8px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
}
.badge-owned { background: #4ecca3; color: #000; }
.badge-equipped { background: #ffd700; color: #000; }
.badge-new { background: #e94560; color: #fff; }
.player-select-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 15px;
}
.player-tab {
  padding: 8px 24px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  cursor: pointer;
  border: 2px solid transparent;
  font-size: 14px;
  font-weight: bold;
}
.player-tab.active { border-color: #e94560; background: rgba(233,69,96,0.2); }
.shop-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}
.shop-btn {
  padding: 12px 36px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: all 0.2s;
}
.btn-continue {
  background: #e94560;
  color: #fff;
}
.btn-continue:hover { background: #ff6b81; transform: scale(1.05); }
#menu-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
  z-index: 200;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#menu-overlay.hidden { display: none; }
.menu-title {
  font-size: 72px;
  color: #e94560;
  text-transform: uppercase;
  letter-spacing: 12px;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(233,69,96,0.5);
}
.menu-sub {
  color: #666;
  font-size: 18px;
  margin-bottom: 50px;
  letter-spacing: 4px;
}
.menu-players {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
}
.menu-player-card {
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 20px 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  min-width: 160px;
}
.menu-player-card:hover, .menu-player-card.active {
  border-color: #e94560;
  background: rgba(233,69,96,0.1);
}
.menu-player-card .card-icon {
  font-size: 48px;
  margin-bottom: 10px;
}
.menu-player-card .card-label {
  color: #fff;
  font-size: 16px;
  font-weight: bold;
}
.menu-player-card .card-keys {
  color: #666;
  font-size: 11px;
  margin-top: 8px;
  line-height: 1.6;
}
.menu-start {
  padding: 16px 60px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 4px;
  transition: all 0.3s;
  margin-bottom: 20px;
}
.menu-start:hover { background: #ff6b81; transform: scale(1.05); box-shadow: 0 0 30px rgba(233,69,96,0.5); }
.menu-start:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
.menu-info {
  color: #444;
  font-size: 12px;
  text-align: center;
  line-height: 1.8;
}
#gameover-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#gameover-overlay.active { display: flex; }
.gameover-title { color: #e94560; font-size: 64px; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 20px; }
.gameover-stats { color: #aaa; font-size: 18px; margin-bottom: 30px; text-align: center; line-height: 2; }
.gameover-stats span { color: #ffd700; font-weight: bold; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-overlay">
  <div class="menu-title">Arena Blitz</div>
  <div class="menu-sub">2D Multiplayer Shooter</div>
  <div class="menu-players" id="player-cards"></div>
  <button class="menu-start" id="start-btn" disabled>Start Game</button>
  <div class="menu-info">
    Selecteer minstens 1 speler om te beginnen<br>
    Versla vijanden, verdien coins, koop upgrades!
  </div>
</div>

<!-- SHOP -->
<div id="shop-overlay">
  <div class="shop-container">
    <div class="shop-title">Wapen Winkel</div>
    <div class="shop-subtitle" id="shop-level-info"></div>
    <div class="player-select-row" id="shop-player-tabs"></div>
    <div id="shop-content"></div>
    <div class="shop-buttons">
      <button class="shop-btn btn-continue" id="shop-continue">Volgende Wave &rarr;</button>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover-overlay">
  <div class="gameover-title">Game Over</div>
  <div class="gameover-stats" id="gameover-stats"></div>
  <button class="menu-start" id="restart-btn">Opnieuw Spelen</button>
</div>

<canvas id="game"></canvas>

<script>
// ===================== GAME CONFIG =====================
const CONFIG = {
  WIDTH: 0,
  HEIGHT: 0,
  TILE: 40,
  FPS: 60,
  PLAYER_SPEED: 4,
  PLAYER_RADIUS: 20,
  PLAYER_MAX_HP: 100,
  BULLET_SPEED: 8,
  COIN_VALUE: 10,
  ENEMY_SPAWN_RATE: 30,
  COLORS: {
    players: ['#e94560', '#4ecca3', '#3498db', '#f39c12'],
    playerNames: ['Rood', 'Groen', 'Blauw', 'Oranje'],
  }
};

// ===================== CONTROLS CONFIG =====================
const PLAYER_CONTROLS = [
  { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', shoot: 'mouse0', label: 'WASD + Muis Links', aimMode: 'mouse' },
  { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', shoot: 'Numpad0', label: 'Pijltjes + Numpad 0', shootDir: true, aimMode: 'movement' },
  { up: 'KeyI', down: 'KeyK', left: 'KeyJ', right: 'KeyL', shoot: 'KeyH', label: 'IJKL + H', aimMode: 'movement' },
  { up: 'Numpad8', down: 'Numpad5', left: 'Numpad4', right: 'Numpad6', shoot: 'NumpadEnter', label: 'Numpad 8456 + Enter', aimMode: 'movement' },
];

// ===================== WEAPON DEFINITIONS =====================
const WEAPONS = {
  pistol: {
    name: 'Pistool', desc: 'Betrouwbaar basiswapen', price: 0,
    damage: 15, fireRate: 18, bulletSpeed: 9, spread: 0.03,
    bullets: 1, bulletSize: 3, range: 500, color: '#fff',
    auto: false
  },
  smg: {
    name: 'SMG', desc: 'Snel vuren, minder schade', price: 200,
    damage: 8, fireRate: 5, bulletSpeed: 10, spread: 0.12,
    bullets: 1, bulletSize: 2, range: 350, color: '#ffd700',
    auto: true, unlockLevel: 1
  },
  shotgun: {
    name: 'Shotgun', desc: 'Verspreid schot, dodelijk dichtbij', price: 350,
    damage: 12, fireRate: 30, bulletSpeed: 8, spread: 0.15,
    bullets: 6, bulletSize: 3, range: 250, color: '#ff6b6b',
    auto: false, unlockLevel: 2
  },
  sniper: {
    name: 'Sniper', desc: 'Hoge schade, trage vuursnelheid', price: 500,
    damage: 80, fireRate: 50, bulletSpeed: 16, spread: 0.01,
    bullets: 1, bulletSize: 4, range: 800, color: '#00ff88',
    auto: false, unlockLevel: 3, piercing: true
  },
  minigun: {
    name: 'Minigun', desc: 'Extreme vuursnelheid', price: 750,
    damage: 6, fireRate: 3, bulletSpeed: 11, spread: 0.18,
    bullets: 1, bulletSize: 2, range: 400, color: '#ff9f43',
    auto: true, unlockLevel: 5
  },
  rocket: {
    name: 'Raketwerper', desc: 'Explosief! Area damage', price: 1000,
    damage: 60, fireRate: 60, bulletSpeed: 5, spread: 0.02,
    bullets: 1, bulletSize: 6, range: 600, color: '#e94560',
    auto: false, unlockLevel: 7, explosive: true, explosionRadius: 80
  },
  laser: {
    name: 'Laser Rifle', desc: 'Doorborende energiestraal', price: 1500,
    damage: 35, fireRate: 8, bulletSpeed: 20, spread: 0.01,
    bullets: 1, bulletSize: 2, range: 700, color: '#00ffff',
    auto: true, unlockLevel: 10, piercing: true
  },
};

// ===================== UPGRADE DEFINITIONS =====================
const UPGRADES = {
  health_pack: { name: 'Health Pack', desc: 'Herstel 50 HP', price: 50, type: 'consumable', effect: (p) => { p.hp = Math.min(p.maxHp, p.hp + 50); } },
  max_hp_up: { name: 'Max HP +25', desc: 'Verhoog maximale HP', price: 150, type: 'permanent', maxBuy: 5, effect: (p) => { p.maxHp += 25; p.hp += 25; } },
  speed_up: { name: 'Snelheid +0.5', desc: 'Beweeg sneller', price: 200, type: 'permanent', maxBuy: 4, effect: (p) => { p.speed += 0.5; } },
  armor: { name: 'Pantser +10%', desc: 'Verminder schade', price: 250, type: 'permanent', maxBuy: 5, effect: (p) => { p.armor = Math.min(0.5, (p.armor || 0) + 0.1); } },
  damage_up: { name: 'Schade +15%', desc: 'Alle wapens doen meer schade', price: 300, type: 'permanent', maxBuy: 5, effect: (p) => { p.damageMultiplier = (p.damageMultiplier || 1) + 0.15; } },
  life_steal: { name: 'Life Steal', desc: 'Herstel 5% van schade als HP', price: 500, type: 'permanent', maxBuy: 1, unlockLevel: 4, effect: (p) => { p.lifeSteal = 0.05; } },
  shield: { name: 'Schild', desc: 'Absorbeert 1 hit per wave', price: 400, type: 'wave', unlockLevel: 3, effect: (p) => { p.shield = 1; } },
};

// ===================== ENEMY DEFINITIONS =====================
const ENEMY_TYPES = {
  grunt: {
    name: 'Grunt', hp: 30, speed: 1.2, radius: 14, damage: 10, color: '#e74c3c',
    score: 10, coins: 8, xp: 5, behavior: 'chase'
  },
  runner: {
    name: 'Runner', hp: 15, speed: 3, radius: 10, damage: 8, color: '#e67e22',
    score: 15, coins: 12, xp: 8, behavior: 'chase', minLevel: 2
  },
  tank: {
    name: 'Tank', hp: 120, speed: 0.7, radius: 22, damage: 20, color: '#8e44ad',
    score: 25, coins: 20, xp: 15, behavior: 'chase', minLevel: 3
  },
  shooter: {
    name: 'Shooter', hp: 40, speed: 0.8, radius: 14, damage: 5, color: '#2ecc71',
    score: 20, coins: 15, xp: 12, behavior: 'shoot', shootRate: 90, bulletSpeed: 4, minLevel: 4
  },
  bomber: {
    name: 'Bomber', hp: 25, speed: 1.8, radius: 16, damage: 35, color: '#f1c40f',
    score: 20, coins: 18, xp: 10, behavior: 'chase', explodeOnDeath: true, explosionRadius: 60, minLevel: 5
  },
  ghost: {
    name: 'Ghost', hp: 35, speed: 1.5, radius: 13, damage: 12, color: 'rgba(200,200,255,0.5)',
    score: 25, coins: 20, xp: 15, behavior: 'flank', minLevel: 6
  },
  splitter: {
    name: 'Splitter', hp: 50, speed: 1, radius: 18, damage: 12, color: '#1abc9c',
    score: 20, coins: 15, xp: 12, behavior: 'chase', splits: true, minLevel: 7
  },
  boss_brute: {
    name: 'BOSS: Brute', hp: 500, speed: 0.6, radius: 35, damage: 30, color: '#c0392b',
    score: 200, coins: 150, xp: 100, behavior: 'chase', isBoss: true, minLevel: 5
  },
  boss_summoner: {
    name: 'BOSS: Summoner', hp: 350, speed: 0.5, radius: 30, damage: 15, color: '#9b59b6',
    score: 250, coins: 200, xp: 120, behavior: 'summon', isBoss: true, summonRate: 180, minLevel: 10
  },
};

// ===================== GAME STATE =====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let gameState = 'menu'; // menu, playing, shop, gameover
let keys = {};
let mouseX = 0, mouseY = 0, mouseDown = false;
let frame = 0;
let wave = 0;
let totalScore = 0;
let screenShake = 0;
let particles = [];
let bullets = [];
let enemyBullets = [];
let enemies = [];
let coins = [];
let pickups = [];
let players = [];
let activePlayers = [false, false, false, false];
let waveEnemiesLeft = 0;
let waveEnemiesSpawned = 0;
let waveEnemiesTotal = 0;
let waveTimer = 0;
let damageNumbers = [];
let announcements = [];
let mapObstacles = [];

// ===================== RESIZE =====================
function resize() {
  CONFIG.WIDTH = window.innerWidth;
  CONFIG.HEIGHT = window.innerHeight;
  canvas.width = CONFIG.WIDTH;
  canvas.height = CONFIG.HEIGHT;
}
window.addEventListener('resize', resize);
resize();

// ===================== INPUT =====================
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mousedown', e => { if (e.button === 0) { keys['mouse0'] = true; mouseDown = true; } });
window.addEventListener('mouseup', e => { if (e.button === 0) { keys['mouse0'] = false; mouseDown = false; } });
window.addEventListener('contextmenu', e => e.preventDefault());

// ===================== UTILITY =====================
function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }
function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(speed * 0.3, speed);
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: rand(life * 0.5, life), maxLife: life,
      color, radius: rand(1, 4)
    });
  }
}

function addDamageNumber(x, y, value, color = '#fff') {
  damageNumbers.push({ x, y, value: Math.round(value), color, life: 40, vy: -2 });
}

function announce(text, duration = 120) {
  announcements.push({ text, life: duration, maxLife: duration });
}

// ===================== MAP GENERATION =====================
function generateMap() {
  mapObstacles = [];
  const numObstacles = 8 + wave * 2;
  for (let i = 0; i < Math.min(numObstacles, 25); i++) {
    const w = rand(40, 120);
    const h = rand(40, 120);
    const x = rand(100, CONFIG.WIDTH - 100 - w);
    const y = rand(100, CONFIG.HEIGHT - 100 - h);
    // Don't place near center (spawn area)
    const cx = x + w/2, cy = y + h/2;
    if (dist({x: cx, y: cy}, {x: CONFIG.WIDTH/2, y: CONFIG.HEIGHT/2}) < 150) continue;
    mapObstacles.push({ x, y, w, h });
  }
}

// ===================== PLAYER CLASS =====================
function createPlayer(index) {
  const spawnPositions = [
    { x: CONFIG.WIDTH * 0.3, y: CONFIG.HEIGHT * 0.5 },
    { x: CONFIG.WIDTH * 0.7, y: CONFIG.HEIGHT * 0.5 },
    { x: CONFIG.WIDTH * 0.5, y: CONFIG.HEIGHT * 0.3 },
    { x: CONFIG.WIDTH * 0.5, y: CONFIG.HEIGHT * 0.7 },
  ];
  const pos = spawnPositions[index];
  return {
    index,
    x: pos.x, y: pos.y,
    vx: 0, vy: 0,
    hp: CONFIG.PLAYER_MAX_HP,
    maxHp: CONFIG.PLAYER_MAX_HP,
    speed: CONFIG.PLAYER_SPEED,
    radius: CONFIG.PLAYER_RADIUS,
    color: CONFIG.COLORS.players[index],
    name: CONFIG.COLORS.playerNames[index],
    alive: true,
    weapon: 'pistol',
    ownedWeapons: ['pistol'],
    upgradeCounts: {},
    coins: 0,
    score: 0,
    kills: 0,
    fireCooldown: 0,
    aimAngle: 0,
    lastMoveAngle: 0,
    armor: 0,
    damageMultiplier: 1,
    lifeSteal: 0,
    shield: 0,
    invincible: 0,
    level: 1,
    xp: 0,
    xpToLevel: 50,
    dashCooldown: 0,
    trail: [],
  };
}

// ===================== ENEMY SPAWNING =====================
function getSpawnPos() {
  const side = randInt(0, 3);
  const margin = 30;
  switch (side) {
    case 0: return { x: rand(-margin, CONFIG.WIDTH + margin), y: -margin };
    case 1: return { x: CONFIG.WIDTH + margin, y: rand(-margin, CONFIG.HEIGHT + margin) };
    case 2: return { x: rand(-margin, CONFIG.WIDTH + margin), y: CONFIG.HEIGHT + margin };
    case 3: return { x: -margin, y: rand(-margin, CONFIG.HEIGHT + margin) };
  }
}

function getWaveEnemies(waveNum) {
  const types = Object.entries(ENEMY_TYPES).filter(([k, v]) => !v.isBoss && (!v.minLevel || v.minLevel <= waveNum));
  let total = 5 + waveNum * 3 + Math.floor(waveNum * waveNum * 0.3);
  total = Math.min(total, 60);
  const isBossWave = waveNum % 5 === 0 && waveNum > 0;
  return { types, total, isBossWave };
}

function spawnEnemy(typeKey, typeDef, waveNum) {
  const pos = getSpawnPos();
  const hpScale = 1 + (waveNum - (typeDef.minLevel || 1)) * 0.15;
  return {
    type: typeKey,
    ...pos,
    hp: typeDef.hp * hpScale,
    maxHp: typeDef.hp * hpScale,
    speed: typeDef.speed * (1 + waveNum * 0.02),
    radius: typeDef.radius,
    damage: typeDef.damage,
    color: typeDef.color,
    score: typeDef.score,
    coins: typeDef.coins,
    xp: typeDef.xp,
    behavior: typeDef.behavior,
    isBoss: typeDef.isBoss || false,
    shootRate: typeDef.shootRate || 0,
    shootTimer: typeDef.shootRate || 0,
    bulletSpeed: typeDef.bulletSpeed || 0,
    explodeOnDeath: typeDef.explodeOnDeath || false,
    explosionRadius: typeDef.explosionRadius || 0,
    splits: typeDef.splits || false,
    summonRate: typeDef.summonRate || 0,
    summonTimer: typeDef.summonRate || 0,
    flashTimer: 0,
    target: null,
    moveAngle: rand(0, Math.PI * 2),
    flanking: false,
    flankTimer: 0,
  };
}

function spawnBoss(waveNum) {
  const bossTypes = Object.entries(ENEMY_TYPES).filter(([k, v]) => v.isBoss && (!v.minLevel || v.minLevel <= waveNum));
  if (bossTypes.length === 0) return;
  const [key, def] = bossTypes[randInt(0, bossTypes.length - 1)];
  const boss = spawnEnemy(key, def, waveNum);
  enemies.push(boss);
  announce('BOSS INCOMING!', 120);
  screenShake = 20;
}

// ===================== START WAVE =====================
function startWave(waveNum) {
  wave = waveNum;
  const { types, total, isBossWave } = getWaveEnemies(waveNum);
  waveEnemiesTotal = total;
  waveEnemiesSpawned = 0;
  waveEnemiesLeft = total;
  waveTimer = 0;
  generateMap();

  // Respawn dead players
  players.forEach(p => {
    if (!p.alive) {
      p.alive = true;
      p.hp = Math.floor(p.maxHp * 0.5);
      p.invincible = 120;
    }
    p.shield = 0;
    // Re-apply wave upgrades
    if (p.upgradeCounts['shield']) p.shield = 1;
  });

  enemies = [];
  bullets = [];
  enemyBullets = [];
  coins = [];
  pickups = [];

  if (isBossWave) {
    setTimeout(() => spawnBoss(waveNum), 2000);
  }

  announce(`Wave ${waveNum}`, 90);
  gameState = 'playing';
}

let shopPlayer = 0;

function openShop() {
  gameState = 'shop';
  shopPlayer = players.findIndex(p => p); // first active player
  renderShop();
  document.getElementById('shop-overlay').classList.add('active');
}

function closeShop() {
  document.getElementById('shop-overlay').classList.remove('active');
  startWave(wave + 1);
}

function renderShop() {
  const overlay = document.getElementById('shop-overlay');
  document.getElementById('shop-level-info').textContent = `Wave ${wave} voltooid! Bereid je voor op Wave ${wave + 1}`;

  // Player tabs
  const tabsDiv = document.getElementById('shop-player-tabs');
  tabsDiv.innerHTML = '';
  players.forEach((p, i) => {
    if (!p) return;
    const tab = document.createElement('div');
    tab.className = 'player-tab' + (i === shopPlayer ? ' active' : '');
    tab.style.borderColor = i === shopPlayer ? p.color : 'transparent';
    tab.innerHTML = `${p.name} <span style="color:#ffd700">$${p.coins}</span>`;
    tab.onclick = () => { shopPlayer = i; renderShop(); };
    tabsDiv.appendChild(tab);
  });

  const p = players[shopPlayer];
  if (!p) return;

  const content = document.getElementById('shop-content');
  content.innerHTML = '';

  // Weapons section
  const weaponSection = document.createElement('div');
  weaponSection.className = 'shop-section';
  weaponSection.innerHTML = '<h3>Wapens</h3>';
  const weaponGrid = document.createElement('div');
  weaponGrid.className = 'shop-grid';

  Object.entries(WEAPONS).forEach(([key, w]) => {
    if (w.unlockLevel && w.unlockLevel > wave) return;
    const owned = p.ownedWeapons.includes(key);
    const equipped = p.weapon === key;
    const item = document.createElement('div');
    item.className = 'shop-item' + (owned ? ' owned' : '') + (equipped ? ' equipped' : '');
    let badge = '';
    if (equipped) badge = '<span class="item-badge badge-equipped">Equipped</span>';
    else if (owned) badge = '<span class="item-badge badge-owned">Owned</span>';
    else if (!w.unlockLevel || w.unlockLevel === wave) badge = '<span class="item-badge badge-new">New!</span>';

    item.innerHTML = `
      ${badge}
      <div class="item-name">${w.name}</div>
      <div class="item-desc">${w.desc}</div>
      <div class="item-stats">DMG: ${w.damage} | Snelheid: ${Math.round(60/w.fireRate)}/s | Bereik: ${w.range}${w.piercing ? ' | Doorborend' : ''}${w.explosive ? ' | Explosief' : ''}</div>
      <div class="item-price">${owned ? (equipped ? 'Uitgerust' : 'Klik om uit te rusten') : '$' + w.price}</div>
    `;
    item.onclick = () => {
      if (equipped) return;
      if (owned) {
        p.weapon = key;
      } else if (p.coins >= w.price) {
        p.coins -= w.price;
        p.ownedWeapons.push(key);
        p.weapon = key;
      }
      renderShop();
    };
    weaponGrid.appendChild(item);
  });
  weaponSection.appendChild(weaponGrid);
  content.appendChild(weaponSection);

  // Upgrades section
  const upgradeSection = document.createElement('div');
  upgradeSection.className = 'shop-section';
  upgradeSection.innerHTML = '<h3>Upgrades</h3>';
  const upgradeGrid = document.createElement('div');
  upgradeGrid.className = 'shop-grid';

  Object.entries(UPGRADES).forEach(([key, u]) => {
    if (u.unlockLevel && u.unlockLevel > wave) return;
    const count = p.upgradeCounts[key] || 0;
    const maxed = u.maxBuy && count >= u.maxBuy;
    const item = document.createElement('div');
    item.className = 'shop-item' + (maxed ? ' owned' : '');

    item.innerHTML = `
      <div class="item-name">${u.name}</div>
      <div class="item-desc">${u.desc}${u.maxBuy ? ` (${count}/${u.maxBuy})` : ''}</div>
      <div class="item-price">${maxed ? 'MAX' : '$' + u.price}</div>
    `;
    item.onclick = () => {
      if (maxed) return;
      if (p.coins >= u.price) {
        p.coins -= u.price;
        u.effect(p);
        p.upgradeCounts[key] = count + 1;
        renderShop();
      }
    };
    upgradeGrid.appendChild(item);
  });
  upgradeSection.appendChild(upgradeGrid);
  content.appendChild(upgradeSection);
}

// ===================== GAME LOGIC =====================
function updatePlayers() {
  players.forEach((p, i) => {
    if (!p || !p.alive) return;
    const ctrl = PLAYER_CONTROLS[i];

    // Movement
    let mx = 0, my = 0;
    if (keys[ctrl.up]) my = -1;
    if (keys[ctrl.down]) my = 1;
    if (keys[ctrl.left]) mx = -1;
    if (keys[ctrl.right]) mx = 1;

    if (mx !== 0 || my !== 0) {
      const len = Math.sqrt(mx * mx + my * my);
      mx /= len; my /= len;
      p.lastMoveAngle = Math.atan2(my, mx);
    }

    p.vx = mx * p.speed;
    p.vy = my * p.speed;

    // Collision with obstacles
    let nx = p.x + p.vx;
    let ny = p.y + p.vy;

    for (const obs of mapObstacles) {
      const cx = clamp(nx, obs.x, obs.x + obs.w);
      const cy = clamp(ny, obs.y, obs.y + obs.h);
      const dx = nx - cx, dy = ny - cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < p.radius) {
        const overlap = p.radius - d;
        if (d > 0) { nx += (dx / d) * overlap; ny += (dy / d) * overlap; }
      }
    }

    p.x = clamp(nx, p.radius, CONFIG.WIDTH - p.radius);
    p.y = clamp(ny, p.radius, CONFIG.HEIGHT - p.radius);

    // Trail
    if (mx !== 0 || my !== 0) {
      p.trail.push({ x: p.x, y: p.y, life: 10 });
      if (p.trail.length > 8) p.trail.shift();
    }
    p.trail = p.trail.filter(t => { t.life--; return t.life > 0; });

    // Aim
    if (ctrl.aimMode === 'mouse') {
      p.aimAngle = Math.atan2(mouseY - p.y, mouseX - p.x);
    } else {
      if (mx !== 0 || my !== 0) {
        p.aimAngle = p.lastMoveAngle;
      }
    }

    // Shoot
    if (p.fireCooldown > 0) p.fireCooldown--;
    if (p.invincible > 0) p.invincible--;

    const shouldShoot = ctrl.aimMode === 'mouse' ? keys['mouse0'] : keys[ctrl.shoot];
    const weapon = WEAPONS[p.weapon];

    if (shouldShoot && p.fireCooldown <= 0) {
      if (weapon.auto || !p._shootHeld) {
        for (let b = 0; b < weapon.bullets; b++) {
          const spreadAngle = p.aimAngle + rand(-weapon.spread, weapon.spread);
          bullets.push({
            x: p.x + Math.cos(p.aimAngle) * (p.radius + 5),
            y: p.y + Math.sin(p.aimAngle) * (p.radius + 5),
            vx: Math.cos(spreadAngle) * weapon.bulletSpeed,
            vy: Math.sin(spreadAngle) * weapon.bulletSpeed,
            damage: weapon.damage * p.damageMultiplier,
            radius: weapon.bulletSize,
            color: weapon.color,
            owner: i,
            range: weapon.range,
            distTraveled: 0,
            piercing: weapon.piercing || false,
            explosive: weapon.explosive || false,
            explosionRadius: weapon.explosionRadius || 0,
            hit: [],
          });
        }
        p.fireCooldown = weapon.fireRate;
        screenShake = Math.max(screenShake, weapon.explosive ? 5 : 2);
      }
    }
    p._shootHeld = shouldShoot;

    // XP level up
    if (p.xp >= p.xpToLevel) {
      p.xp -= p.xpToLevel;
      p.level++;
      p.xpToLevel = Math.floor(p.xpToLevel * 1.4);
      p.maxHp += 10;
      p.hp = Math.min(p.maxHp, p.hp + 20);
      spawnParticles(p.x, p.y, p.color, 20, 4, 30);
      announce(`${p.name} Level ${p.level}!`, 60);
    }

    // Coin pickup
    coins = coins.filter(c => {
      const d = dist(p, c);
      if (d < p.radius + c.radius + 10) {
        p.coins += c.value;
        p.score += c.value;
        spawnParticles(c.x, c.y, '#ffd700', 5, 2, 15);
        return false;
      }
      // Magnet effect
      if (d < 100) {
        const a = angle(c, p);
        c.x += Math.cos(a) * 3;
        c.y += Math.sin(a) * 3;
      }
      return true;
    });

    // Pickup collection
    pickups = pickups.filter(pk => {
      if (dist(p, pk) < p.radius + 15) {
        pk.effect(p);
        spawnParticles(pk.x, pk.y, pk.color, 8, 3, 20);
        return false;
      }
      return true;
    });
  });
}

function updateBullets() {
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    b.distTraveled += Math.sqrt(b.vx * b.vx + b.vy * b.vy);

    if (b.distTraveled > b.range || b.x < -50 || b.x > CONFIG.WIDTH + 50 || b.y < -50 || b.y > CONFIG.HEIGHT + 50) {
      return false;
    }

    // Obstacle collision
    for (const obs of mapObstacles) {
      if (b.x > obs.x && b.x < obs.x + obs.w && b.y > obs.y && b.y < obs.y + obs.h) {
        if (b.explosive) {
          explode(b.x, b.y, b.explosionRadius, b.damage, b.owner);
        }
        spawnParticles(b.x, b.y, b.color, 3, 2, 10);
        return false;
      }
    }

    // Enemy collision
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (b.hit.includes(i)) continue;
      if (dist(b, e) < b.radius + e.radius) {
        e.hp -= b.damage;
        e.flashTimer = 6;
        addDamageNumber(e.x, e.y - e.radius, b.damage, '#ff6b6b');
        spawnParticles(b.x, b.y, b.color, 4, 3, 12);
        screenShake = Math.max(screenShake, 1);

        // Life steal
        const owner = players[b.owner];
        if (owner && owner.lifeSteal) {
          owner.hp = Math.min(owner.maxHp, owner.hp + b.damage * owner.lifeSteal);
        }

        if (e.hp <= 0) {
          killEnemy(e, i, b.owner);
        }

        if (b.explosive) {
          explode(b.x, b.y, b.explosionRadius, b.damage * 0.6, b.owner);
          return false;
        }

        if (b.piercing) {
          b.hit.push(i);
          b.damage *= 0.7;
          continue;
        }
        return false;
      }
    }
    return true;
  });
}

function explode(x, y, radius, damage, ownerIdx) {
  spawnParticles(x, y, '#ff6b6b', 25, 6, 25);
  spawnParticles(x, y, '#ffd700', 15, 4, 20);
  screenShake = 10;

  enemies.forEach((e, i) => {
    const d = dist({ x, y }, e);
    if (d < radius) {
      const dmg = damage * (1 - d / radius);
      e.hp -= dmg;
      e.flashTimer = 8;
      addDamageNumber(e.x, e.y - e.radius, dmg, '#ff9f43');
      if (e.hp <= 0) killEnemy(e, i, ownerIdx);
    }
  });
}

function killEnemy(e, idx, ownerIdx) {
  spawnParticles(e.x, e.y, e.color, 15, 4, 20);

  // Drop coins
  const numCoins = Math.ceil(e.coins / 10);
  for (let j = 0; j < numCoins; j++) {
    coins.push({
      x: e.x + rand(-20, 20), y: e.y + rand(-20, 20),
      radius: 5, value: Math.ceil(e.coins / numCoins),
      life: 600,
    });
  }

  // Rare health drop
  if (Math.random() < 0.1) {
    pickups.push({
      x: e.x, y: e.y, color: '#4ecca3', life: 600, radius: 8,
      type: 'health',
      effect: (p) => { p.hp = Math.min(p.maxHp, p.hp + 25); addDamageNumber(p.x, p.y - 20, 25, '#4ecca3'); }
    });
  }

  // Explode on death
  if (e.explodeOnDeath) {
    explode(e.x, e.y, e.explosionRadius, e.damage, -1);
    // Damage players too
    players.forEach(p => {
      if (!p || !p.alive) return;
      const d = dist(p, e);
      if (d < e.explosionRadius) {
        damagePlayer(p, e.damage * (1 - d / e.explosionRadius));
      }
    });
  }

  // Split
  if (e.splits) {
    for (let s = 0; s < 2; s++) {
      const mini = spawnEnemy('grunt', ENEMY_TYPES.grunt, wave);
      mini.x = e.x + rand(-20, 20);
      mini.y = e.y + rand(-20, 20);
      mini.hp *= 0.5;
      mini.maxHp *= 0.5;
      mini.radius *= 0.7;
      mini.color = '#1abc9c';
      enemies.push(mini);
    }
  }

  // Give XP to all alive players
  players.forEach(p => {
    if (!p || !p.alive) return;
    p.xp += e.xp;
    p.kills++;
    p.score += e.score;
  });
  totalScore += e.score;

  enemies.splice(idx, 1);
  waveEnemiesLeft--;
}

function damagePlayer(p, damage) {
  if (p.invincible > 0) return;
  if (p.shield > 0) {
    p.shield--;
    spawnParticles(p.x, p.y, '#00ffff', 10, 4, 20);
    announce(`${p.name}'s schild blokkeert!`, 40);
    p.invincible = 30;
    return;
  }
  const actualDamage = damage * (1 - p.armor);
  p.hp -= actualDamage;
  p.invincible = 15;
  screenShake = Math.max(screenShake, 4);
  spawnParticles(p.x, p.y, p.color, 8, 3, 15);
  addDamageNumber(p.x, p.y - p.radius - 10, actualDamage, p.color);

  if (p.hp <= 0) {
    p.alive = false;
    spawnParticles(p.x, p.y, p.color, 30, 5, 30);
    announce(`${p.name} is uitgeschakeld!`, 60);
  }
}

function updateEnemies() {
  const alivePlayers = players.filter(p => p && p.alive);
  if (alivePlayers.length === 0) return;

  // Spawn enemies
  if (waveEnemiesSpawned < waveEnemiesTotal) {
    waveTimer++;
    const spawnInterval = Math.max(10, CONFIG.ENEMY_SPAWN_RATE - wave * 3);
    if (waveTimer >= spawnInterval) {
      waveTimer = 0;
      const { types } = getWaveEnemies(wave);
      const [key, def] = types[randInt(0, types.length - 1)];
      enemies.push(spawnEnemy(key, def, wave));
      waveEnemiesSpawned++;
    }
  }

  enemies.forEach((e, idx) => {
    // Find closest player
    let closest = alivePlayers[0];
    let closestDist = dist(e, closest);
    alivePlayers.forEach(p => {
      const d = dist(e, p);
      if (d < closestDist) { closest = p; closestDist = d; }
    });
    e.target = closest;

    const a = angle(e, closest);
    e.flashTimer = Math.max(0, e.flashTimer - 1);

    // Behavior
    switch (e.behavior) {
      case 'chase': {
        e.x += Math.cos(a) * e.speed;
        e.y += Math.sin(a) * e.speed;
        break;
      }
      case 'shoot': {
        // Keep distance
        if (closestDist > 250) {
          e.x += Math.cos(a) * e.speed;
          e.y += Math.sin(a) * e.speed;
        } else if (closestDist < 150) {
          e.x -= Math.cos(a) * e.speed;
          e.y -= Math.sin(a) * e.speed;
        }
        // Shoot
        e.shootTimer--;
        if (e.shootTimer <= 0) {
          e.shootTimer = e.shootRate;
          enemyBullets.push({
            x: e.x, y: e.y,
            vx: Math.cos(a) * e.bulletSpeed,
            vy: Math.sin(a) * e.bulletSpeed,
            damage: e.damage, radius: 4, color: e.color,
            life: 200,
          });
        }
        break;
      }
      case 'flank': {
        e.flankTimer++;
        const flankAngle = a + Math.sin(e.flankTimer * 0.03) * 1.5;
        e.x += Math.cos(flankAngle) * e.speed;
        e.y += Math.sin(flankAngle) * e.speed;
        break;
      }
      case 'summon': {
        // Boss: summon behavior
        if (closestDist > 200) {
          e.x += Math.cos(a) * e.speed;
          e.y += Math.sin(a) * e.speed;
        }
        e.summonTimer--;
        if (e.summonTimer <= 0) {
          e.summonTimer = e.summonRate;
          for (let s = 0; s < 3; s++) {
            const grunt = spawnEnemy('grunt', ENEMY_TYPES.grunt, wave);
            grunt.x = e.x + rand(-40, 40);
            grunt.y = e.y + rand(-40, 40);
            enemies.push(grunt);
          }
          spawnParticles(e.x, e.y, '#9b59b6', 15, 5, 20);
          announce('Summoner roept minions op!', 60);
        }
        break;
      }
    }

    // Obstacle collision
    for (const obs of mapObstacles) {
      const cx = clamp(e.x, obs.x, obs.x + obs.w);
      const cy = clamp(e.y, obs.y, obs.y + obs.h);
      const dx = e.x - cx, dy = e.y - cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < e.radius && d > 0) {
        const overlap = e.radius - d;
        e.x += (dx / d) * overlap;
        e.y += (dy / d) * overlap;
      }
    }

    // Keep in bounds (loosely)
    e.x = clamp(e.x, -50, CONFIG.WIDTH + 50);
    e.y = clamp(e.y, -50, CONFIG.HEIGHT + 50);

    // Damage players on contact
    alivePlayers.forEach(p => {
      if (p.invincible > 0) return;
      if (dist(e, p) < e.radius + p.radius) {
        damagePlayer(p, e.damage);
      }
    });
  });
}

function updateEnemyBullets() {
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0 || b.x < -50 || b.x > CONFIG.WIDTH + 50 || b.y < -50 || b.y > CONFIG.HEIGHT + 50) return false;

    // Obstacle collision
    for (const obs of mapObstacles) {
      if (b.x > obs.x && b.x < obs.x + obs.w && b.y > obs.y && b.y < obs.y + obs.h) {
        return false;
      }
    }

    // Player collision
    for (const p of players) {
      if (!p || !p.alive || p.invincible > 0) continue;
      if (dist(b, p) < b.radius + p.radius) {
        damagePlayer(p, b.damage);
        spawnParticles(b.x, b.y, b.color, 4, 2, 10);
        return false;
      }
    }
    return true;
  });
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life--;
    return p.life > 0;
  });
}

function updateDamageNumbers() {
  damageNumbers = damageNumbers.filter(d => {
    d.y += d.vy;
    d.life--;
    return d.life > 0;
  });
}

function updateAnnouncements() {
  announcements = announcements.filter(a => { a.life--; return a.life > 0; });
}

function updateCoins() {
  coins = coins.filter(c => { c.life--; return c.life > 0; });
  pickups = pickups.filter(p => { p.life--; return p.life > 0; });
}

function checkWaveComplete() {
  if (gameState !== 'playing') return;
  if (waveEnemiesLeft <= 0 && waveEnemiesSpawned >= waveEnemiesTotal && enemies.length === 0) {
    announce(`Wave ${wave} voltooid!`, 90);
    setTimeout(() => {
      if (gameState === 'playing') openShop();
    }, 1500);
  }

  // Check game over
  const anyAlive = players.some(p => p && p.alive);
  if (!anyAlive) {
    gameState = 'gameover';
    document.getElementById('gameover-overlay').classList.add('active');
    let statsHtml = `
      <div>Bereikt: <span>Wave ${wave}</span></div>
      <div>Totale Score: <span>${totalScore}</span></div>
    `;
    players.forEach(p => {
      if (!p) return;
      statsHtml += `<div style="color:${p.color}">${p.name}: ${p.kills} kills, Level ${p.level}, $${p.coins}</div>`;
    });
    document.getElementById('gameover-stats').innerHTML = statsHtml;
  }
}

// ===================== DRAWING =====================
function drawBackground() {
  // Arena floor gradient
  const grad = ctx.createRadialGradient(CONFIG.WIDTH/2, CONFIG.HEIGHT/2, 50, CONFIG.WIDTH/2, CONFIG.HEIGHT/2, CONFIG.WIDTH * 0.6);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  const gridSize = 50;
  for (let x = 0; x < CONFIG.WIDTH; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CONFIG.HEIGHT); ctx.stroke();
  }
  for (let y = 0; y < CONFIG.HEIGHT; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CONFIG.WIDTH, y); ctx.stroke();
  }

  // Arena border
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 3;
  ctx.strokeRect(5, 5, CONFIG.WIDTH - 10, CONFIG.HEIGHT - 10);
  ctx.strokeStyle = 'rgba(233,69,96,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(15, 15, CONFIG.WIDTH - 30, CONFIG.HEIGHT - 30);
}

function drawObstacles() {
  mapObstacles.forEach(obs => {
    ctx.fillStyle = '#1a1a2e';
    ctx.strokeStyle = '#2d2d4e';
    ctx.lineWidth = 2;
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);

    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(obs.x, obs.y, obs.w, 3);
  });
}

function drawPlayers() {
  players.forEach((p, i) => {
    if (!p || !p.alive) return;

    // Trail
    p.trail.forEach(t => {
      const alpha = t.life / 10 * 0.2;
      ctx.fillStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(t.x, t.y, p.radius * 0.7, 0, Math.PI * 2);
      ctx.fill();
    });

    // Shield
    if (p.shield > 0) {
      ctx.strokeStyle = 'rgba(0,255,255,0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius + 8, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Invincibility flash
    if (p.invincible > 0 && Math.floor(p.invincible / 3) % 2 === 0) return;

    // Outer glow
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 20;

    // Body
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();

    // Body outline
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Inner glow
    const grad = ctx.createRadialGradient(p.x - 4, p.y - 4, 0, p.x, p.y, p.radius);
    grad.addColorStop(0, 'rgba(255,255,255,0.4)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();

    // Gun
    const gunLen = 22;
    const gunWidth = 5;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.aimAngle);
    ctx.fillStyle = '#ccc';
    ctx.fillRect(p.radius - 4, -gunWidth / 2, gunLen, gunWidth);
    ctx.fillStyle = '#999';
    ctx.fillRect(p.radius - 4, -gunWidth / 2, gunLen, 2);
    ctx.restore();

    // Name & HP
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(`P${i + 1}`, p.x, p.y - p.radius - 18);

    // HP bar
    const barW = 30, barH = 4;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(p.x - barW / 2, p.y - p.radius - 12, barW, barH);
    const hpPct = p.hp / p.maxHp;
    ctx.fillStyle = hpPct > 0.5 ? '#4ecca3' : hpPct > 0.25 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(p.x - barW / 2, p.y - p.radius - 12, barW * hpPct, barH);
  });
}

function drawEnemies() {
  enemies.forEach(e => {
    const flash = e.flashTimer > 0;

    // Boss glow
    if (e.isBoss) {
      ctx.fillStyle = `rgba(${hexToRgb(e.color)},0.1)`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 15 + Math.sin(frame * 0.05) * 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body
    ctx.fillStyle = flash ? '#fff' : e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fill();

    // Eyes (towards target)
    if (e.target) {
      const a = angle(e, e.target);
      const eyeOff = e.radius * 0.35;
      const eyeR = e.radius * 0.2;
      ctx.fillStyle = flash ? e.color : '#000';
      // Left eye
      ctx.beginPath();
      ctx.arc(e.x + Math.cos(a - 0.4) * eyeOff, e.y + Math.sin(a - 0.4) * eyeOff, eyeR, 0, Math.PI * 2);
      ctx.fill();
      // Right eye
      ctx.beginPath();
      ctx.arc(e.x + Math.cos(a + 0.4) * eyeOff, e.y + Math.sin(a + 0.4) * eyeOff, eyeR, 0, Math.PI * 2);
      ctx.fill();
    }

    // HP bar
    if (e.hp < e.maxHp) {
      const barW = e.radius * 2, barH = 3;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(e.x - barW / 2, e.y - e.radius - 8, barW, barH);
      ctx.fillStyle = e.isBoss ? '#e94560' : '#e74c3c';
      ctx.fillRect(e.x - barW / 2, e.y - e.radius - 8, barW * (e.hp / e.maxHp), barH);
    }

    // Boss name
    if (e.isBoss) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(ENEMY_TYPES[e.type].name, e.x, e.y - e.radius - 14);
    }
  });
}

function drawBullets() {
  bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  enemyBullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawCoins() {
  coins.forEach(c => {
    const alpha = c.life < 60 ? c.life / 60 : 1;
    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.radius + Math.sin(frame * 0.1 + c.x) * 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,255,200,${alpha * 0.5})`;
    ctx.beginPath();
    ctx.arc(c.x - 1, c.y - 1, c.radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
  });

  pickups.forEach(pk => {
    const alpha = pk.life < 60 ? pk.life / 60 : 1;
    ctx.fillStyle = pk.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(pk.x, pk.y, pk.radius + Math.sin(frame * 0.08) * 2, 0, Math.PI * 2);
    ctx.fill();

    // Cross for health
    if (pk.type === 'health') {
      ctx.fillStyle = '#fff';
      ctx.fillRect(pk.x - 4, pk.y - 1, 8, 2);
      ctx.fillRect(pk.x - 1, pk.y - 4, 2, 8);
    }
    ctx.globalAlpha = 1;
  });
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawDamageNumbers() {
  damageNumbers.forEach(d => {
    const alpha = d.life / 40;
    ctx.fillStyle = d.color;
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${12 + (40 - d.life) * 0.3}px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillText(d.value, d.x, d.y);
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, CONFIG.WIDTH, 50);

  // Wave info
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 18px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE ${wave}`, CONFIG.WIDTH / 2, 32);

  // Enemies left
  ctx.fillStyle = '#888';
  ctx.font = '13px Segoe UI';
  ctx.fillText(`Vijanden: ${enemies.length} | Resterend: ${Math.max(0, waveEnemiesTotal - waveEnemiesSpawned + enemies.length)}`, CONFIG.WIDTH / 2, 46);

  // Score
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 14px Segoe UI';
  ctx.textAlign = 'right';
  ctx.fillText(`Score: ${totalScore}`, CONFIG.WIDTH - 20, 32);

  // Player stats
  let xOff = 20;
  players.forEach((p, i) => {
    if (!p) return;
    const w = 200;
    const y = CONFIG.HEIGHT - 70;

    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(xOff - 5, y - 5, w, 65);

    // Name
    ctx.fillStyle = p.alive ? p.color : '#555';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'left';
    ctx.fillText(`P${i + 1} ${p.name} ${p.alive ? '' : '(DOOD)'}`, xOff, y + 12);

    // HP bar
    ctx.fillStyle = '#333';
    ctx.fillRect(xOff, y + 18, w - 10, 8);
    if (p.alive) {
      const hpPct = p.hp / p.maxHp;
      ctx.fillStyle = hpPct > 0.5 ? '#4ecca3' : hpPct > 0.25 ? '#f39c12' : '#e74c3c';
      ctx.fillRect(xOff, y + 18, (w - 10) * hpPct, 8);
    }
    ctx.fillStyle = '#fff';
    ctx.font = '10px Segoe UI';
    ctx.fillText(`${Math.ceil(p.hp)}/${p.maxHp}`, xOff, y + 38);

    // XP bar
    ctx.fillStyle = '#222';
    ctx.fillRect(xOff, y + 42, w - 10, 4);
    ctx.fillStyle = '#3498db';
    ctx.fillRect(xOff, y + 42, (w - 10) * (p.xp / p.xpToLevel), 4);

    // Weapon & coins
    ctx.fillStyle = '#aaa';
    ctx.font = '11px Segoe UI';
    ctx.fillText(`${WEAPONS[p.weapon].name} | Lv.${p.level} | $${p.coins}`, xOff, y + 56);

    xOff += w + 15;
  });

  // Announcements
  announcements.forEach((a, i) => {
    const alpha = a.life / a.maxLife;
    const scale = a.life > a.maxLife - 10 ? 1 + (a.maxLife - a.life) * 0.02 : 1;
    ctx.fillStyle = `rgba(233,69,96,${alpha})`;
    ctx.font = `bold ${28 * scale}px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillText(a.text, CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 80 + i * 40);
  });
}

function hexToRgb(hex) {
  if (hex.startsWith('rgba')) return '200,200,255'; // fallback for ghost
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ===================== MAIN LOOP =====================
function update() {
  if (gameState !== 'playing') return;
  frame++;
  updatePlayers();
  updateBullets();
  updateEnemyBullets();
  updateEnemies();
  updateParticles();
  updateDamageNumbers();
  updateAnnouncements();
  updateCoins();
  checkWaveComplete();
  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.5) screenShake = 0;
}

function draw() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

  if (gameState === 'menu') return;
  if (gameState === 'gameover') return;
  if (gameState === 'shop') return;

  try {
    ctx.save();
    if (screenShake > 0) {
      ctx.translate(rand(-screenShake, screenShake), rand(-screenShake, screenShake));
    }

    drawBackground();
    drawObstacles();
    drawCoins();
    drawBullets();
    drawEnemies();
    drawPlayers();
    drawParticles();
    drawDamageNumbers();

    ctx.restore();
    drawHUD();
  } catch(err) {
    ctx.restore();
    ctx.fillStyle = 'red';
    ctx.font = '20px monospace';
    ctx.fillText('Error: ' + err.message, 20, 40);
    console.error(err);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
